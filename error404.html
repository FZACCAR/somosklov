<!DOCTYPE html>

<head>
<meta charset="UTF-8" />
<script>
  (function () {
    try {
      var stored = localStorage.getItem('klov-theme');
      var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      if (stored === 'light' || (!stored && prefersLight)) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (e) {}
  })();
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #12121A;
    --bg2:       #0E0E16;
    --card:      #1A1A26;
    --border:    #2E2E42;
    --purple:    #7F77DD;
    --purple-lt: #A89EE8;
    --purple-dk: #534AB7;
    --text:      #EEEEF2;
    --muted:     #555568;
    --text-soft: #C8C8DC;
    --muted2:    #9090B0;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans:  'Roboto', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  html[data-theme="light"] {
    --bg:        #F7F6FC;
    --bg2:       #FFFFFF;
    --card:      #FFFFFF;
    --border:    #E1DDF0;
    --purple:    #6E62D6;
    --purple-lt: #5B4FC4;
    --purple-dk: #453C99;
    --text:      #201D2E;
    --muted:     #6B6884;
    --text-soft: #4B4768;
    --muted2:    #6E6B8C;
  }

  html, body {
    background: var(--bg); color: var(--text); font-family: var(--font-sans);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  a { color: var(--purple-lt); text-decoration: none; }

  /* fondo con textura sutil, igual espíritu que el resto del sitio */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(circle at 15% 20%, rgba(127,119,221,0.16), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(168,158,232,0.12), transparent 50%);
  }

  nav {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 3rem;
    background: rgba(18,18,26,0.72);
    backdrop-filter: blur(14px);
    border-bottom: 0.5px solid var(--border);
  }
  html[data-theme="light"] nav { background: rgba(255,255,255,0.78); }
  .nav-logo { font-family: var(--font-serif); font-size: 1.5rem; letter-spacing: 1px; color: var(--text); font-weight: 700; }
  .nav-logo span { color: var(--purple-lt); font-style: italic; }

  main {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    min-height: calc(100vh - 76px);
    padding: 3rem 1.5rem 4rem;
  }

  .eyebrow {
    font-size: 10px; color: var(--purple); letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 1.6rem; position: relative; display: inline-flex; align-items: center; gap: 8px;
  }
  .eyebrow::before {
    content: ''; width: 10px; height: 1px; background: var(--purple-lt);
    box-shadow: 0 0 8px rgba(168,158,232,0.8);
  }

  .code {
    font-family: var(--font-serif); font-style: italic; font-weight: 400;
    font-size: clamp(5rem, 16vw, 9rem); line-height: 0.9;
    color: var(--purple-lt);
    margin-bottom: 1.4rem;
    letter-spacing: -2px;
  }

  h1 {
    font-family: var(--font-serif); font-weight: 400;
    font-size: clamp(1.5rem, 4vw, 2.1rem);
    margin-bottom: 0.9rem;
  }
  h1 em { font-style: italic; color: var(--purple-lt); }

  main > p.desc {
    max-width: 440px; color: var(--text-soft); opacity: 0.9;
    font-size: 14.5px; line-height: 1.7; margin-bottom: 2.6rem;
  }

  .actions {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 3.2rem;
  }
  .btn-cta {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 400; color: var(--text);
    background: transparent; border: 1px solid #7B6FD4; border-radius: 999px;
    padding: 15px 36px; letter-spacing: 3px; text-decoration: none; text-transform: uppercase;
    transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
  }
  .btn-cta:hover { background: #7B6FD4; color: #fff; transform: translateY(-1px); }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 400; color: var(--muted2);
    background: transparent; border: none;
    padding: 15px 10px; letter-spacing: 3px; text-decoration: none; text-transform: uppercase;
    transition: color 0.2s ease;
  }
  .btn-ghost:hover { color: var(--purple-lt); }

  .quick-links {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; max-width: 620px; width: 100%;
  }
  .quick-links a {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 0.5px solid var(--border); border-radius: 12px;
    padding: 14px 16px; font-size: 13px; color: var(--text-soft);
    transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
  }
  .quick-links a:hover { border-color: var(--purple); color: var(--text); transform: translateY(-2px); }
  .quick-links a i { color: var(--purple-lt); font-size: 17px; flex-shrink: 0; }

  @media (max-width: 700px) {
    nav { padding: 1rem 1.2rem; }
    main { padding: 2.5rem 1.2rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="https://www.somosklov.com.ar/" class="nav-logo">KL<span>Ō</span>V</a>
</nav>

<main>
  <div class="eyebrow">Ups...</div>
  <div class="code">Error 404</div>
  <h1>Esta página <em>no existe</em></h1>
  <p class="desc">
    Balance descuadrado. Esta página se ha ido a la quiebra y no dejó rastro en los libros contables. Por favor, audita la URL e intenta buscar de nuevo.
  </p>

  <div class="actions">
    <a href="https://www.somosklov.com.ar/" class="btn-cta">
      <i class="ti ti-home"></i> Volver al inicio
    </a>
    <a href="https://www.somosklov.com.ar/#contacto" class="btn-ghost">
      Escribinos <i class="ti ti-arrow-right"></i>
    </a>
  </div>

  <div class="quick-links">
    <a href="https://www.somosklov.com.ar/#servicios"><i class="ti ti-report-money"></i> Servicios</a>
    <a href="https://www.somosklov.com.ar/#nosotras"><i class="ti ti-users"></i> Nosotras</a>
    <a href="https://www.somosklov.com.ar/#reservas"><i class="ti ti-calendar-event"></i> Reservar reunión</a>
  </div>
</main>

</body>
</html>
